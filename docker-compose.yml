services:
  squid:
    build:
      context: .
      dockerfile: squid/Dockerfile
    ports:
      - "3128:3128"
      - "8077:8077"
      - "127.0.0.1:33100-33999:33100-33999"
    volumes:
      - ./config:/opt/config:ro
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      STATE_DB_PATH: ${STATE_DB_PATH:-/data/proxypool.sqlite3}
      WEB_PORT: ${WEB_PORT:-8077}
