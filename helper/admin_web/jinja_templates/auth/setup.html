<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <i class="ti ti-lock-cog" style="font-size:2.5rem;color:var(--pp-primary)"></i>
      <h1 style="font-size:1.4rem;font-weight:700;margin:0.5rem 0 0;color:var(--pp-text)">ProxyPool</h1>
    </div>
    <div class="card">
      <div class="card-body" style="padding:2rem;">
        <h2 style="font-size:1.1rem;font-weight:600;text-align:center;margin-bottom:0.75rem;">{{ i.setup_title }}</h2>
        <p style="margin:0 0 1rem 0;color:var(--pp-text-secondary);font-size:0.92rem;line-height:1.6;">{{ i.setup_intro }}</p>
        <div class="alert alert-info" style="border-radius:6px;">
          <div>{{ i.setup_generated_notice }}</div>
          <div style="margin-top:0.35rem;">{{ i.setup_reset_hint }}</div>
        </div>
        {% if message %}
        <div class="alert alert-info" style="border-radius:6px;">{{ message }}</div>
        {% endif %}
        {% if error %}
        <div class="alert alert-danger" style="border-radius:6px;">{{ error }}</div>
        {% endif %}
        <form method="post" action="/setup" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label" for="password">{{ i.setup_password_label }}</label>
            <input type="password" class="form-control" id="password"
                   name="password" placeholder="{{ i.setup_password_placeholder }}"
                   autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirm_password">{{ i.setup_confirm_label }}</label>
            <input type="password" class="form-control" id="confirm_password"
                   name="confirm_password" placeholder="{{ i.setup_confirm_placeholder }}"
                   required>
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100" style="padding:0.6rem;">{{ i.setup_btn }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
