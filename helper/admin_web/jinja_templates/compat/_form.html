<div class="card">
  <div class="card-header" style="padding:0.9rem 1.25rem;">
    <h3 class="card-title" style="margin:0;font-size:0.95rem;">
      <i class="ti ti-plug-connected me-1"></i>{{ i.compat_form_title }}
    </h3>
  </div>
  <div class="card-body" style="padding:1.25rem;">
    {% if error %}
    <div class="alert alert-danger" style="border-radius:6px;">{{ error }}</div>
    {% endif %}
    <form method="post"
          action="/dashboard/compat/save"
          id="compat-form"
          data-default-listen-port="{{ listen_port if not edit_mode else port_min }}"
          data-default-target-type="{{ target_types[1].value }}"
          data-save-label="{{ i.compat_form_save }}"
          data-update-label="{{ i.compat_form_update }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="original_listen_port" id="compat-original-listen-port" value="{{ original_listen_port }}">
      <div class="mb-3">
        <label class="form-label" for="listen_port">{{ i.compat_form_port }}</label>
        <input type="number" class="form-control" id="listen_port" name="listen_port"
               min="{{ port_min }}" max="{{ port_max }}" value="{{ listen_port }}" required>
        <span class="form-hint">{{ i.compat_form_port_hint }}</span>
      </div>
      <div class="mb-3">
        <label class="form-label" for="target_type">{{ i.compat_form_target_type }}</label>
        <select class="form-select" id="target_type" name="target_type">
          {% for item in target_types %}
          <option value="{{ item.value }}" {% if target_type == item.value %}selected{% endif %}>{{ item.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label" for="target_value">{{ i.compat_form_target_value }}</label>
        <input type="text" class="form-control" id="target_value" name="target_value"
               value="{{ target_value }}" list="compat-entry-keys" required>
        <span class="form-hint" id="compat-target-hint"
              data-entry-key-hint="{{ i.compat_form_target_hint_entry_key }}"
              data-session-name-hint="{{ i.compat_form_target_hint_session_name }}">
          {{ target_hint }}
        </span>
        <datalist id="compat-entry-keys">
          {% for entry in entry_options %}
          <option value="{{ entry.key }}">{{ entry.label }}</option>
          {% endfor %}
        </datalist>
      </div>
      <div class="mb-3">
        <label class="form-label" for="note">{{ i.compat_form_note }}</label>
        <input type="text" class="form-control" id="note" name="note" value="{{ note }}">
      </div>
      <label class="form-check mb-3" style="display:flex;align-items:center;gap:0.6rem;">
        <input class="form-check-input" id="compat-enabled" type="checkbox" name="enabled" value="1" {% if enabled %}checked{% endif %}>
        <span class="form-check-label">{{ i.compat_form_enabled }}</span>
      </label>
      <div class="d-flex gap-2 flex-wrap">
        <button type="submit" class="btn btn-primary" id="compat-submit-btn">
          <span class="pp-btn-text" id="compat-submit-label"><i class="ti ti-device-floppy me-1"></i>{{ submit_label }}</span>
        </button>
        <button type="button"
                id="compat-cancel-edit"
                class="btn"
                style="border:1px solid var(--pp-border);color:var(--pp-text);{% if not edit_mode %}display:none;{% endif %}">
          {{ i.compat_form_cancel_edit }}
        </button>
      </div>
    </form>
  </div>
</div>
